default_language_version:
  python: python3.12  # or python3

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-toml

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
    -   id: ruff-check
        args: [--fix]

-   repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
    -   id: black
        args: [--line-length=100]

-   repo: local
    hooks:
    -   id: pytest-unit
        name: pytest unit quick
        entry: .venv/bin/pytest -q -m unit tests/unit
        language: system
        pass_filenames: false
    -   id: pytest-web-boundary
        name: pytest web boundary
        entry: .venv/bin/pytest -q -m web tests/ui/test_web_api_boundary.py
        language: system
        pass_filenames: false
    -   id: pytest-api-smoke
        name: pytest api smoke
        entry: .venv/bin/pytest -q -m api tests/api/routers/test_system_routes.py tests/api/routers/test_reports_routes.py
        language: system
        pass_filenames: false
    -   id: pytest-contract
        name: pytest contract boundary
        entry: .venv/bin/pytest -q -m contract tests/integration
        language: system
        pass_filenames: false
