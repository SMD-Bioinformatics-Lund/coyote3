default_language_version:
  python: python3
default_stages: [pre-commit]

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-toml

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
    -   id: ruff-check
        args: [--fix]
        stages: [pre-commit]
    -   id: ruff-format
        stages: [pre-commit]

-   repo: local
    hooks:
    -   id: contract-integrity
        name: contract integrity checks
        entry: bash scripts/check_contract_integrity.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
