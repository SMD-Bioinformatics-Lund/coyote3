name: coyote3-stage
# usage:
#   cp deploy/env/example.stage.env .coyote3_stage_env
#   export COYOTE3_VERSION="$(python3 coyote/__version__.py)"
#   docker compose --env-file .coyote3_stage_env -f deploy/compose/docker-compose.stage.yml up -d --build
services:
  coyote3_stage_web:
    container_name: coyote3_stage_web_${COYOTE3_VERSION:-local}
    image: coyote3:${COYOTE3_VERSION:-local}
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      network: host
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "${COYOTE3_STAGE_WEB_PORT:-7814}:8000"
    env_file:
      - ../../.coyote3_stage_env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - FLASK_APP=wsgi
      - FLASK_DEBUG=0
      - CACHE_ENABLED=1
      - CACHE_REQUIRED=1
      - API_BASE_URL=http://coyote3_stage_api:8001
      - API_BROWSER_BASE=/api
      - TZ=Europe/Stockholm
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: always
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    networks:
      - coyote3-stage-net
    volumes:
      - "/access:/access"
      - "/media:/media"
      - "/data:/data"
      - "/fs1:/fs1"
    command: "gunicorn --config gunicorn.conf.py --bind 0.0.0.0:8000 wsgi:app"
    depends_on:
      coyote3_stage_api:
        condition: service_healthy

  coyote3_stage_api:
    container_name: coyote3_stage_api_${COYOTE3_VERSION:-local}
    image: coyote3:${COYOTE3_VERSION:-local}
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      network: host
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "${COYOTE3_STAGE_API_PORT:-7816}:8001"
    env_file:
      - ../../.coyote3_stage_env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - CACHE_ENABLED=1
      - CACHE_REQUIRED=1
      - TZ=Europe/Stockholm
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: always
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    networks:
      - coyote3-stage-net
    volumes:
      - "/access:/access"
      - "/media:/media"
      - "/data:/data"
      - "/fs1:/fs1"
    command: "python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/v1/health', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      coyote3_stage_mongo:
        condition: service_started
      redis_coyote3_stage:
        condition: service_started

  redis_coyote3_stage:
    container_name: redis_coyote3_stage_${COYOTE3_VERSION:-local}
    image: ramsainanduri/redis:7.4.3
    ports:
      - "${COYOTE3_STAGE_REDIS_PORT:-7817}:6379"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    networks:
      - coyote3-stage-net
    restart: unless-stopped
    privileged: true

  coyote3_stage_mongo:
    container_name: coyote3_stage_mongo_${COYOTE3_VERSION:-local}
    image: mongo:7.0
    command: ["--bind_ip_all"]
    ports:
      - "${COYOTE3_STAGE_MONGO_PORT:-47017}:27017"
    restart: unless-stopped
    stop_grace_period: 120s
    networks:
      - coyote3-stage-net
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-coyote3_root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-CHANGE_ME_STAGE_ROOT_PASSWORD}
      - COYOTE3_DB=${COYOTE3_DB:-coyote3}
      - MONGO_APP_USER=${MONGO_APP_USER:-coyote3_app}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD:-CHANGE_ME_STAGE_APP_PASSWORD}
    volumes:
      - stage-mongodb:/data/db
      - /data/coyote3/stage/backups/mongo:/backup
      - ./mongo-init/create-app-user.js:/docker-entrypoint-initdb.d/01-create-app-user.js:ro

networks:
  coyote3-stage-net:
    driver: bridge

volumes:
  stage-mongodb:
