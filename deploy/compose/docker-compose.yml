version: "3.9"
# usage:
# COYOTE3_VERSION is read from coyote/__version__.py (example):
#   export COYOTE3_VERSION="$(python3 coyote/__version__.py)"
# docker compose -f deploy/compose/docker-compose.yml up -d
# docker compose -f deploy/compose/docker-compose.yml down
services:
  # UI container: Flask/Jinja presentation layer. Calls coyote3_api over HTTP.
  coyote3_web:
    container_name: coyote3_web
    image: coyote3:${COYOTE3_VERSION:-local}
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      network: host
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "5814:8000"
    env_file:
      - ../../.coyote3_env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - FLASK_APP=wsgi
      - FLASK_DEBUG=0
      - REQUIRE_EXTERNAL_API=1
      - CACHE_ENABLED=1
      - CACHE_REQUIRED=1
      - API_BASE_URL=http://coyote3_api:8001
      - API_BROWSER_BASE=/api
      - TZ=Europe/Stockholm
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: always
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    networks:
      - coyote3-net
    volumes:
      - "/access:/access"
      - "/media:/media"
      - "/data:/data"
      - "/fs1:/fs1"
    command: "python3 -m wsgi"
    depends_on:
      - coyote3_api

  # API container: FastAPI business/policy/data layer.
  coyote3_api:
    container_name: coyote3_api
    image: coyote3:${COYOTE3_VERSION:-local}
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      network: host
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "5816:8001"
    env_file:
      - ../../.coyote3_env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - REQUIRE_EXTERNAL_API=0
      - CACHE_ENABLED=1
      - CACHE_REQUIRED=1
      - TZ=Europe/Stockholm
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: always
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    networks:
      - coyote3-net
    volumes:
      - "/access:/access"
      - "/media:/media"
      - "/data:/data"
      - "/fs1:/fs1"
    command: "python3 -m uvicorn api.app:app --host 0.0.0.0 --port 8001"
    depends_on:
      - redis_coyote3

  # Shared infrastructure dependency.
  redis_coyote3:
    container_name: redis_coyote3
    image: ramsainanduri/redis:7.4.3
    ports:
      - "5817:6379"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    networks:
      - coyote3-net
    restart: unless-stopped
    privileged: true

  # Optional self-hosted Mongo service for environments that do not use managed/external Mongo.
  # Enable with:
  #   ./scripts/compose-with-version.sh -f deploy/compose/docker-compose.yml --profile with-mongo up -d
  # IMPORTANT:
  #   Set FLASK_MONGO_HOST=coyote3_mongo in .coyote3_env when using this profile.
  coyote3_mongo:
    container_name: coyote3_mongo
    image: mongo:7.0
    profiles: ["with-mongo"]
    command: ["--bind_ip_all"]
    restart: unless-stopped
    stop_grace_period: 120s
    networks:
      - coyote3-net
    ports:
      - "${COYOTE3_MONGO_PORT:-27017}:27017"
    volumes:
      - coyote3-prod-mongo-data:/data/db
      - /data/coyote3/backups/mongo:/backup

networks:
  coyote3-net:
    external: true

volumes:
  # External volume prevents accidental deletion by `docker compose down -v`.
  # Must exist before first start:
  #   docker volume create coyote3-prod-mongo-data
  coyote3-prod-mongo-data:
    external: true
    name: ${COYOTE3_MONGO_VOLUME:-coyote3-prod-mongo-data}
