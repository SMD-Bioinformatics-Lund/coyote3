name: coyote3-prod
# usage:
# COYOTE3_VERSION is read from coyote/__version__.py (example):
#   export COYOTE3_VERSION="$(python3 coyote/__version__.py)"
# docker compose -f deploy/compose/docker-compose.yml up -d
# docker compose -f deploy/compose/docker-compose.yml down
services:
  # UI container: Flask/Jinja presentation layer. Calls coyote3_api over HTTP.
  coyote3_web:
    container_name: coyote3_web_${COYOTE3_VERSION:-local}
    image: coyote3:${COYOTE3_VERSION:-local}
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      network: host
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "${COYOTE3_WEB_PORT:-5816}:8000"
    env_file:
      - ../../.coyote3_env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - FLASK_APP=wsgi
      - FLASK_DEBUG=0
      - CACHE_ENABLED=1
      - CACHE_REQUIRED=1
      - API_BASE_URL=http://coyote3_api:8001
      - API_BROWSER_BASE=/api
      - HELP_CENTER_URL=${HELP_CENTER_URL:-}
      - TZ=Europe/Stockholm
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: always
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    networks:
      - coyote3-net
    volumes:
      - "/access:/access"
      - "/media:/media"
      - "/data:/data"
      - "/fs1:/fs1"
    command: "gunicorn --config gunicorn.conf.py --bind 0.0.0.0:8000 wsgi:app"
    depends_on:
      coyote3_api:
        condition: service_healthy

  # Standalone docs container (MkDocs static site) for troubleshooting when app services are degraded.
  coyote3_docs:
    container_name: coyote3_docs_${COYOTE3_VERSION:-local}
    image: coyote3-docs:${COYOTE3_VERSION:-local}
    build:
      context: ../..
      dockerfile: docker/Dockerfile.docs
      network: host
    ports:
      - "${COYOTE3_DOCS_PORT:-5821}:8080"
    restart: always
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    networks:
      - coyote3-net

  # API container: FastAPI business/policy/data layer.
  coyote3_api:
    container_name: coyote3_api_${COYOTE3_VERSION:-local}
    image: coyote3:${COYOTE3_VERSION:-local}
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      network: host
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "${COYOTE3_API_PORT:-5818}:8001"
    env_file:
      - ../../.coyote3_env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - CACHE_ENABLED=1
      - CACHE_REQUIRED=1
      - TZ=Europe/Stockholm
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: always
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coyote3-net
    volumes:
      - "/access:/access"
      - "/media:/media"
      - "/data:/data"
      - "/fs1:/fs1"
    command: "python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8001 --workers ${API_WORKERS:-4}"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/v1/health', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      - redis_coyote3

  coyote3_first_run:
    container_name: coyote3_first_run_${COYOTE3_VERSION:-local}
    image: coyote3:${COYOTE3_VERSION:-local}
    profiles: ["first-run"]
    env_file:
      - ../../.coyote3_env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - COYOTE3_FIRST_RUN=${COYOTE3_FIRST_RUN:-0}
      - FIRST_RUN_ADMIN_EMAIL=${FIRST_RUN_ADMIN_EMAIL:-}
      - FIRST_RUN_ADMIN_PASSWORD=${FIRST_RUN_ADMIN_PASSWORD:-}
      - FIRST_RUN_API_BASE_URL=${FIRST_RUN_API_BASE_URL:-http://coyote3_api:8001}
      - FIRST_RUN_MONGO_URI=${FIRST_RUN_MONGO_URI:-}
      - FIRST_RUN_DB_NAME=${FIRST_RUN_DB_NAME:-}
      - FIRST_RUN_SEED_FILE=${FIRST_RUN_SEED_FILE:-tests/fixtures/db_dummy/all_collections_dummy}
      - FIRST_RUN_REFERENCE_SEED_DATA=${FIRST_RUN_REFERENCE_SEED_DATA:-}
      - FIRST_RUN_YAML_FILE=${FIRST_RUN_YAML_FILE:-tests/data/ingest_demo/generic_case_control.yaml}
      - FIRST_RUN_ASSAY_GROUP=${FIRST_RUN_ASSAY_GROUP:-GROUP_A}
      - FIRST_RUN_ASSAY=${FIRST_RUN_ASSAY:-ASSAY_A}
      - FIRST_RUN_WITH_OPTIONAL=${FIRST_RUN_WITH_OPTIONAL:-0}
      - FIRST_RUN_SKIP_EXISTING=${FIRST_RUN_SKIP_EXISTING:-1}
      - FIRST_RUN_RUN_SMOKE=${FIRST_RUN_RUN_SMOKE:-1}
    restart: "no"
    networks:
      - coyote3-net
    command: "bash scripts/compose_first_run.sh"
    depends_on:
      coyote3_api:
        condition: service_healthy

  # Shared infrastructure dependency.
  redis_coyote3:
    container_name: redis_coyote3_${COYOTE3_VERSION:-local}
    image: redis:7.4.3
    ports:
      - "${COYOTE3_REDIS_PORT:-5819}:6379"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    networks:
      - coyote3-net
    restart: unless-stopped
    privileged: true

  # Optional self-hosted Mongo service for environments that do not use managed/external Mongo.
  # Enable with:
  #   ./scripts/compose-with-version.sh -f deploy/compose/docker-compose.yml --profile with-mongo up -d
  # IMPORTANT:
  #   Set MONGO_URI=mongodb://coyote3_mongo:27017/coyote3 in .coyote3_env when using this profile.
  coyote3_mongo:
    container_name: coyote3_mongo_${COYOTE3_VERSION:-local}
    image: mongo:7.0
    profiles: ["with-mongo"]
    command: ["--bind_ip_all"]
    restart: unless-stopped
    stop_grace_period: 120s
    networks:
      - coyote3-net
    ports:
      - "${COYOTE3_MONGO_PORT:-5820}:27017"
    env_file:
      - ../../.coyote3_env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-coyote3_root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-CHANGE_ME_PROD_ROOT_PASSWORD}
      - COYOTE3_DB=${COYOTE3_DB:-coyote3}
      - MONGO_APP_USER=${MONGO_APP_USER:-coyote3_app}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD:-CHANGE_ME_PROD_APP_PASSWORD}
    volumes:
      - prod-mongodb:/data/db
      - /data/coyote3/backups/mongo:/backup
      - ./mongo-init/create-app-user.js:/docker-entrypoint-initdb.d/01-create-app-user.js:ro

networks:
  coyote3-net:
    driver: bridge

volumes:
  prod-mongodb:
