name: coyote3-dev
# usage:
# COYOTE3_VERSION is read from coyote/__version__.py (example):
#   export COYOTE3_VERSION="$(python3 coyote/__version__.py)"
# docker compose -f deploy/compose/docker-compose.dev.yml up -d
# docker compose -f deploy/compose/docker-compose.dev.yml down
services:
  # UI container: Flask/Jinja presentation layer. Calls coyote3_dev_api over HTTP.
  coyote3_dev_web:
    container_name: coyote3_dev_web_${COYOTE3_VERSION:-local}
    image: coyote3:${COYOTE3_VERSION:-local}-dev
    build:
      context: ../..
      dockerfile: docker/Dockerfile.dev
      network: host
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "6817:8000"
    env_file:
      - ../../.coyote3_dev_env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - FLASK_APP=wsgi
      - FLASK_DEBUG=1
      - REQUIRE_EXTERNAL_API=1
      - CACHE_ENABLED=1
      - CACHE_REQUIRED=1
      - API_BASE_URL=http://coyote3_dev_api:8001
      - API_BROWSER_BASE=/api
      - TZ=Europe/Stockholm
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: always
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    extra_hosts:
      - "mtlucmds1.lund.skane.se:172.17.0.1"
    networks:
      - coyote3-dev-net
    volumes:
      - "../../.git:/app/.git"
      - "../../coyote:/app/coyote"
      - "../../api:/app/api"
      - "../../shared:/app/shared"
      - "../../config:/app/config"
      - "/data/coyote3/logs:/app/logs"
      - "../../docs:/app/docs"
      - "../../config.py:/app/config.py"
      - "../../wsgi.py:/app/wsgi.py"
      - "../../deploy/gunicorn/gunicorn.conf.py:/app/gunicorn.conf.py"
      - "../../logging_setup.py:/app/logging_setup.py"
      - "../../CHANGELOG.md:/app/CHANGELOG.md"
      - "../../README.md:/app/README.md"
      - "../../LICENSE.txt:/app/LICENSE.txt"
      - "/access:/access"
      - "/media:/media"
      - "/data:/data"
      - "/fs1:/fs1"
    command: "python3 -m wsgi"
    depends_on:
      coyote3_dev_api:
        condition: service_healthy

  # API container: FastAPI business/policy/data layer.
  coyote3_dev_api:
    container_name: coyote3_dev_api_${COYOTE3_VERSION:-local}
    image: coyote3:${COYOTE3_VERSION:-local}-dev
    build:
      context: ../..
      dockerfile: docker/Dockerfile.dev
      network: host
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "6816:8001"
    env_file:
      - ../../.coyote3_dev_env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - REQUIRE_EXTERNAL_API=0
      - CACHE_ENABLED=1
      - CACHE_REQUIRED=1
      - TZ=Europe/Stockholm
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    restart: always
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    extra_hosts:
      - "mtlucmds1.lund.skane.se:172.17.0.1"
    networks:
      - coyote3-dev-net
    volumes:
      - "../../.git:/app/.git"
      - "../../coyote:/app/coyote"
      - "../../api:/app/api"
      - "../../shared:/app/shared"
      - "../../config:/app/config"
      - "/data/coyote3/logs:/app/logs"
      - "../../docs:/app/docs"
      - "../../config.py:/app/config.py"
      - "../../wsgi.py:/app/wsgi.py"
      - "../../asgi.py:/app/asgi.py"
      - "../../deploy/gunicorn/gunicorn.conf.py:/app/gunicorn.conf.py"
      - "../../logging_setup.py:/app/logging_setup.py"
      - "../../CHANGELOG.md:/app/CHANGELOG.md"
      - "../../README.md:/app/README.md"
      - "../../LICENSE.txt:/app/LICENSE.txt"
      - "/access:/access"
      - "/media:/media"
      - "/data:/data"
      - "/fs1:/fs1"
    command: "python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8001 --reload --reload-dir /app/coyote --reload-dir /app/api --reload-dir /app"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/v1/health', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      coyote3_dev_mongo:
        condition: service_started
      redis_coyote3_dev:
        condition: service_started

  # UI asset build/watch helper for development.
  coyote3_dev_tailwind:
    container_name: coyote3_dev_tailwind_${COYOTE3_VERSION:-local}
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -lc "npm config set fund false &&
              npm config set audit false &&
              npm config set fetch-retries 6 &&
              npm config set fetch-retry-mintimeout 20000 &&
              npm config set fetch-retry-maxtimeout 120000 &&
              npm ci --prefer-offline &&
              npm run build:css &&
              npm run dev:css"
    environment:
      - CHOKIDAR_USEPOLLING=1
      - CHOKIDAR_INTERVAL=700
    network_mode: host
    volumes:
      - "../../:/app"
      - "coyote3-node-modules:/app/node_modules"
    restart: unless-stopped

  # Shared infrastructure dependency.
  redis_coyote3_dev:
    container_name: redis_coyote3_dev_${COYOTE3_VERSION:-local}
    image: ramsainanduri/redis:7.4.3
    ports:
      - "5819:6379"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    dns:
      - ${APP_DNS:-1.1.1.1}
      - 8.8.8.8
    networks:
      - coyote3-dev-net
    restart: unless-stopped
    privileged: true

  # Local Mongo for the default dev stack.
  coyote3_dev_mongo:
    container_name: coyote3_dev_mongo_${COYOTE3_VERSION:-local}
    image: mongo:7.0
    command: ["--bind_ip_all"]
    ports:
      - "${COYOTE3_DEV_MONGO_PORT:-37017}:27017"
    restart: unless-stopped
    stop_grace_period: 120s
    networks:
      - coyote3-dev-net
    volumes:
      - dev-mongodb:/data/db
      - /data/coyote3/dev/backups/mongo:/backup

networks:
  coyote3-dev-net:
    driver: bridge

volumes:
  coyote3-node-modules:
    name: coyote3-node-modules
  dev-mongodb:
