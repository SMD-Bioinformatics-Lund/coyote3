{% extends "layout.html" %}
{% block title %}Change Password{% endblock %}
{% block body %}
<div class="max-w-2xl mx-auto mt-10 bg-white rounded-xl shadow-lg border border-gray-200 p-6">
  <h1 class="text-xl font-semibold text-gray-900 mb-2">Change Password</h1>
  <p class="text-sm text-gray-600 mb-6">This is available for local (`coyote3`) accounts.</p>
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
      <input type="password" name="current_password" required
             class="w-full border border-gray-300 rounded-md px-3 py-2" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
      <input type="password" name="new_password" required
             class="w-full border border-gray-300 rounded-md px-3 py-2" />
      <p class="text-xs text-gray-500 mt-1">
        Minimum 10 chars with uppercase, lowercase, number, and symbol.
      </p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
      <input type="password" name="confirm_password" required
             class="w-full border border-gray-300 rounded-md px-3 py-2" />
    </div>
    <div class="pt-2">
      <button type="submit"
              class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-lg">
        Update Password
      </button>
      <a href="{{ url_for('profile_bp.user_profile', user_id=user.username) }}"
         class="ml-2 text-sm text-gray-700 hover:underline">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
