{% extends "layout.html" %}
{% block title %}Reset Password{% endblock %}
{% block body %}
<div class="flex items-center justify-center mt-20">
  <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Set New Password</h1>
    <form method="POST" class="space-y-4">
      <input type="hidden" name="token" value="{{ token }}">
      <div>
        <label class="block text-gray-700 text-sm font-medium mb-2">New Password</label>
        <input type="password" name="new_password" required
               class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-800" />
      </div>
      <div>
        <label class="block text-gray-700 text-sm font-medium mb-2">Confirm Password</label>
        <input type="password" name="confirm_password" required
               class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-800" />
      </div>
      <p class="text-xs text-gray-500">Use at least 10 characters with upper/lowercase, number, and symbol.</p>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md">
        Set Password
      </button>
    </form>
  </div>
</div>
{% endblock %}
