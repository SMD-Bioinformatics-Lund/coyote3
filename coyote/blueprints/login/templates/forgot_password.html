{% extends "layout.html" %}
{% block title %}Forgot Password{% endblock %}
{% block body %}
<div class="flex items-center justify-center mt-20">
  <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Forgot Password</h1>
    <p class="text-sm text-gray-600 mb-6">
      Enter your username or email. If your account is a local user, you will receive a reset email.
    </p>
    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-gray-700 text-sm font-medium mb-2">Username or Email</label>
        <input type="text" name="username" required
               class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-800" />
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md">
        Send Reset Link
      </button>
    </form>
    <p class="mt-4 text-center text-sm">
      <a href="{{ url_for('login_bp.login') }}" class="text-blue-600 hover:underline">Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
