<div id="actionModal" class="fixed inset-0 flex items-center justify-center bg-black/50 z-50 hidden">
  <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-2xl">
    <div class="mb-4 flex items-start justify-between gap-4">
      <div>
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Please Confirm</p>
        <h2 id="actionModalTitle" class="mt-1 text-xl font-semibold text-slate-900">Confirm Action</h2>
      </div>
      <button
        id="actionModalClose"
        type="button"
        class="rounded-full border border-slate-200 px-2 py-1 text-xs font-semibold text-slate-500 transition hover:bg-slate-100"
      >
        Close
      </button>
    </div>
    <div id="actionModalMessage" class="mb-6 text-sm leading-6 text-slate-700">
      Are you sure you want to proceed?
    </div>
    <div class="flex justify-center gap-3">
      <button id="actionModalCancel"
              type="button"
              class="bg-gray-400 hover:bg-gray-500 text-white font-medium py-2 px-4 rounded-lg shadow-lg transition">
        Cancel
      </button>
      <button id="actionModalConfirm"
        type="button"
        class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg shadow-lg transition">
        Confirm
      </button>
    </div>
  </div>
</div>
