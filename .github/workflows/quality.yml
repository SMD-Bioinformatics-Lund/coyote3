name: quality

on:
  pull_request:
  push:
    branches:
      - main
      - codebase_refactor

jobs:
  lint-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff check
        run: ruff check api/settings.py coyote/services/api_client tests/unit tests/contract tests/web

      - name: Ruff format check
        run: ruff format --check api/settings.py coyote/services/api_client tests/unit tests/contract tests/web

      - name: Unit tests
        run: PYTHONPATH=. pytest -q -m unit tests/unit

      - name: Web boundary tests
        run: PYTHONPATH=. pytest -q -m web tests/web/test_web_api_boundary.py

      - name: API smoke tests
        run: PYTHONPATH=. pytest -q -m api tests/api/routes/test_system_routes.py tests/api/routes/test_reports_routes.py

      - name: Contract tests
        run: PYTHONPATH=. pytest -q -m contract tests/contract
