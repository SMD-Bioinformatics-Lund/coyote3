name: quality

on:
  pull_request:
  push:
    branches:
      - main
      - codebase_refactor

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff check
        run: PYTHONPATH=. ruff check api/settings.py coyote/services/api_client tests/unit tests/contract tests/web

      - name: Ruff format check
        run: PYTHONPATH=. ruff format --check api/settings.py coyote/services/api_client tests/unit tests/contract tests/web

      - name: Unit tests
        run: PYTHONPATH=. pytest -q -m unit tests/unit

      - name: Web boundary tests
        run: PYTHONPATH=. pytest -q -m web tests/web/test_web_api_boundary.py

      - name: API smoke tests
        run: PYTHONPATH=. pytest -q -m api tests/api/routes/test_system_routes.py tests/api/routes/test_reports_routes.py

      - name: Contract tests
        run: PYTHONPATH=. pytest -q -m contract tests/contract

      - name: Boundary baseline drift check
        run: PYTHONPATH=. python scripts/refresh_backend_db_boundary_baseline.py --check

      - name: Web/API route contract guardrail
        run: PYTHONPATH=. pytest -q tests/contract/test_web_api_route_contract.py
