name: quality

on:
  pull_request:
  push:
    branches:
      - main
      - codebase_refactor

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    env:
      TESTING: "1"
      DEVELOPMENT: "0"
      COYOTE3_DB: coyote3_test
      MONGO_URI: mongodb://localhost:27017
      COYOTE3_FERNET_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      SECRET_KEY: ci-test-secret-key
      INTERNAL_API_TOKEN: ci-test-internal-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff check
        run: PYTHONPATH=. ruff check api coyote tests scripts

      - name: Black format check
        run: PYTHONPATH=. black --check --line-length 100 api coyote tests scripts

      - name: Unit tests
        run: PYTHONPATH=. pytest -q -m unit tests/unit

      - name: Web boundary tests
        run: PYTHONPATH=. pytest -q -m web tests/ui/test_web_api_boundary.py

      - name: API smoke tests
        run: PYTHONPATH=. pytest -q -m api tests/api/routers/test_system_routes.py tests/api/routers/test_reports_routes.py

      - name: Contract tests
        run: PYTHONPATH=. pytest -q -m contract tests/integration

      - name: Family coverage gates
        run: PYTHONPATH=. bash scripts/run_family_coverage_gates.sh

      - name: Boundary baseline drift check
        run: PYTHONPATH=. python scripts/refresh_backend_db_boundary_baseline.py --check

      - name: Web/API route contract guardrail
        run: PYTHONPATH=. pytest -q tests/integration/test_web_api_route_contract.py

      - name: Compose config smoke
        run: |
          cat > .coyote3_env <<EOF
          MONGO_URI=${MONGO_URI}
          COYOTE3_DB=${COYOTE3_DB}
          COYOTE3_FERNET_KEY=${COYOTE3_FERNET_KEY}
          SECRET_KEY=${SECRET_KEY}
          INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
          EOF
          cat > .coyote3_dev_env <<EOF
          MONGO_URI=${MONGO_URI}
          COYOTE3_DB=${COYOTE3_DB}
          COYOTE3_FERNET_KEY=${COYOTE3_FERNET_KEY}
          SECRET_KEY=${SECRET_KEY}
          INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
          EOF
          docker compose -f deploy/compose/docker-compose.yml config -q
          docker compose -f deploy/compose/docker-compose.dev.yml config -q

      - name: Snapshot tooling smoke
        run: |
          python scripts/create_mongo_snapshot.py --help > /dev/null
          bash scripts/snapshot_restore_dev.sh --help > /dev/null
