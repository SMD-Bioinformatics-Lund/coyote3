name: quality

on:
  pull_request:
  push:
    branches:
      - main
      - codebase_refactor

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    env:
      TESTING: "1"
      DEVELOPMENT: "0"
      COYOTE3_DB: coyote3_test
      MONGO_URI: mongodb://localhost:27017
      MONGO_ROOT_USERNAME: coyote3_root
      MONGO_ROOT_PASSWORD: ci-test-root-password
      MONGO_APP_USER: coyote3_app
      MONGO_APP_PASSWORD: ci-test-app-password
      COYOTE3_FERNET_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      SECRET_KEY: ci-test-secret-key
      INTERNAL_API_TOKEN: ci-test-internal-token
      COYOTE3_VERSION: ci-quality
      GIT_COMMIT: ci
      BUILD_TIME: ci
      # Optional future policy toggle:
      # set repository variable UNIFORM_MIN=60 to enforce 60% for each family gate.
      UNIFORM_MIN: ${{ vars.UNIFORM_MIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Ruff check
        run: PYTHONPATH=. ruff check api coyote tests scripts

      - name: Black format check
        run: PYTHONPATH=. black --check --line-length 100 api coyote tests scripts

      - name: Contract integrity checks
        env:
          PYTHON_BIN: python
        run: bash scripts/check_contract_integrity.sh

      - name: Markdown style lint
        run: |
          markdownlint-cli2 "README.md" "docs/**/*.md" ".github/**/*.md"

      - name: Focused mypy checks (auth boundaries)
        run: |
          PYTHONPATH=. mypy --follow-imports=skip --ignore-missing-imports \
            api/middleware.py \
            api/routers/health.py \
            api/routers/internal.py \
            api/security/auth_service.py \
            api/security/password_flows.py \
            api/security/ports.py \
            api/security/repository.py \
            api/services/internal_ingest_service.py \
            api/infra/notifications/email.py \
            api/observability/prometheus_metrics.py \
            api/services/admin_user_service.py \
            api/services/permission_management_service.py \
            api/services/management_common.py \
            api/routers/registry.py \
            shared/rate_limit.py

      - name: Dependency vulnerability scan
        run: pip-audit -r requirements.txt

      - name: Security static scan
        run: bandit -q -r api coyote -x tests,site,node_modules,migration_scripts

      - name: Filesystem vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Unit tests
        run: PYTHONPATH=. pytest -q -m unit tests/unit

      - name: Web boundary tests
        run: PYTHONPATH=. pytest -q -m web tests/ui/test_web_api_boundary.py

      - name: API quick checks
        run: PYTHONPATH=. pytest -q -m api tests/api/routers/test_system_routes.py tests/api/routers/test_reports_routes.py tests/api/test_api_latency_concurrency.py

      - name: Contract tests
        run: PYTHONPATH=. pytest -q -m contract tests/integration

      - name: Family coverage gates
        run: PYTHONPATH=. bash scripts/run_family_coverage_gates.sh

      - name: Boundary baseline drift check
        run: PYTHONPATH=. python scripts/refresh_backend_db_boundary_baseline.py --check

      - name: Web/API route contract guardrail
        run: PYTHONPATH=. pytest -q tests/integration/test_web_api_route_contract.py

      - name: Compose config check
        run: |
          cat > .coyote3_env <<EOF
          MONGO_URI=${MONGO_URI}
          COYOTE3_DB=${COYOTE3_DB}
          COYOTE3_FERNET_KEY=${COYOTE3_FERNET_KEY}
          SECRET_KEY=${SECRET_KEY}
          INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
          COYOTE3_VERSION=${COYOTE3_VERSION}
          GIT_COMMIT=${GIT_COMMIT}
          BUILD_TIME=${BUILD_TIME}
          MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
          MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
          MONGO_APP_USER=${MONGO_APP_USER}
          MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
          EOF
          cat > .coyote3_dev_env <<EOF
          MONGO_URI=${MONGO_URI}
          COYOTE3_DB=${COYOTE3_DB}
          COYOTE3_FERNET_KEY=${COYOTE3_FERNET_KEY}
          SECRET_KEY=${SECRET_KEY}
          INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
          COYOTE3_VERSION=${COYOTE3_VERSION}
          GIT_COMMIT=${GIT_COMMIT}
          BUILD_TIME=${BUILD_TIME}
          MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
          MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
          MONGO_APP_USER=${MONGO_APP_USER}
          MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
          EOF
          cat > .coyote3_stage_env <<EOF
          MONGO_URI=${MONGO_URI}
          COYOTE3_DB=${COYOTE3_DB}
          COYOTE3_FERNET_KEY=${COYOTE3_FERNET_KEY}
          SECRET_KEY=${SECRET_KEY}
          INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
          COYOTE3_VERSION=${COYOTE3_VERSION}
          GIT_COMMIT=${GIT_COMMIT}
          BUILD_TIME=${BUILD_TIME}
          MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
          MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
          MONGO_APP_USER=${MONGO_APP_USER}
          MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
          EOF
          cat > .coyote3_test_env <<EOF
          MONGO_URI=${MONGO_URI}
          COYOTE3_DB=${COYOTE3_DB}
          COYOTE3_FERNET_KEY=${COYOTE3_FERNET_KEY}
          SECRET_KEY=${SECRET_KEY}
          INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
          COYOTE3_VERSION=${COYOTE3_VERSION}
          GIT_COMMIT=${GIT_COMMIT}
          BUILD_TIME=${BUILD_TIME}
          MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
          MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
          MONGO_APP_USER=${MONGO_APP_USER}
          MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
          EOF
          docker compose -f deploy/compose/docker-compose.yml config -q
          docker compose -f deploy/compose/docker-compose.dev.yml config -q
          docker compose -f deploy/compose/docker-compose.stage.yml config -q
          docker compose -f deploy/compose/docker-compose.test.yml config -q

      - name: Docs strict build
        run: |
          python -m pip install -r requirements-docs.txt
          mkdocs build --strict

      - name: Snapshot tooling check
        run: |
          python scripts/create_mongo_snapshot.py --help > /dev/null
          bash scripts/snapshot_restore_dev.sh --help > /dev/null
