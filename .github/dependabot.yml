version: 2
updates:
  # Keep Python dependencies up-to-date
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 6
    groups:
      # Conservative default: batch only patch updates.
      # Minor/major updates stay ungrouped so they can be reviewed individually.
      prod-patch:
        dependency-type: "production"
        update-types:
          - "patch"
      dev-patch:
        dependency-type: "development"
        update-types:
          - "patch"

  # Keep GitHub Actions up-to-date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
